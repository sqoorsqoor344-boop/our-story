<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>كل الحب</title>
<style>
body{margin:0;background:radial-gradient(circle at center,#1a2340,#05060d 70%);overflow:hidden;
display:flex;align-items:center;justify-content:center;height:100vh;font-family:"Tahoma",sans-serif;color:#fff}
.card{position:relative;z-index:2;max-width:700px;padding:40px;border-radius:20px;
background:rgba(255,255,255,.06);backdrop-filter:blur(8px);box-shadow:0 0 35px rgba(255,255,255,.15);text-align:center}
h1{font-size:2em}p{line-height:2;font-size:1.2em}
a.btn{display:inline-block;margin-top:25px;padding:14px 28px;border-radius:999px;text-decoration:none;
background:#d4af37;color:#111;font-weight:bold}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate}
@keyframes twinkle{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.4)}}
</style></head><body>
<div id='stars'></div>
<div class="card">
<h1>❤️</h1>
<p><strong>أتحبها؟</strong><br>– كلَّ الحب.<br><br><strong>– كم عمرها؟</strong><br>– ثلاثٌ وعشرون عامًا في البطاقة، وثلاثةٌ مع الأطفال، وستون مع الأزمات، وملاكٌ لا عمر له مع الطبيعة، وكلُّهم معي.</p>
<a class="btn" href="https://youtu.be/Hqw5Cd9_8tw?si=BlH7u8U0-q_DitY0" target="_blank">▶ تشغيل الأغنية</a>
</div>
<script>
for(let i=0;i<180;i++){let s=document.createElement('div');s.className='star';
let z=Math.random()*3+1;s.style.width=z+'px';s.style.height=z+'px';
s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';
s.style.animationDelay=(Math.random()*3)+'s';document.body.appendChild(s);}
</script></body></html>
